<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Password Generator</h1>
    </header>

    <main>
      <!-- Password Display (F3) -->
      <section class="display-section" aria-label="Generated password">
        <input
          type="text"
          id="password-display"
          class="password-display"
          readonly
          placeholder="Click Generate to create a password"
          aria-label="Generated password"
          aria-live="polite"
          autocomplete="off"
          spellcheck="false"
        />
      </section>

      <!-- Action Bar (F6, F4) — wired in Plan 01-03 -->
      <section class="action-bar">
        <button
          id="generate-btn"
          class="btn btn-primary"
          aria-label="Generate password"
          type="button"
        >
          Generate Password
        </button>
        <button
          id="copy-btn"
          class="btn btn-secondary"
          aria-label="Copy password to clipboard"
          type="button"
        >
          Copy
        </button>
      </section>

      <!-- Config Panel: Length + Character Sets (Phase 2) -->
      <section class="config-panel" aria-label="Password configuration">

        <!-- Length control -->
        <div class="config-row config-row--length">
          <label class="config-label" for="length-slider">
            Length: <span id="length-display">16</span>
          </label>
          <div class="length-controls">
            <input
              type="range"
              id="length-slider"
              class="length-slider"
              min="8"
              max="128"
              value="16"
              aria-label="Password length"
              aria-valuemin="8"
              aria-valuemax="128"
              aria-valuenow="16"
            />
            <input
              type="number"
              id="length-number"
              class="length-number"
              min="8"
              max="128"
              value="16"
              aria-label="Password length (numeric)"
            />
          </div>
        </div>

        <!-- Character set toggles (Phase 2 Plan 02-02) -->
        <div class="config-row config-row--charsets" id="charset-controls">
          <!-- Populated in Plan 02-02 -->
        </div>

      </section>

      <!-- Strength Indicator (F5) — placeholder for Phase 2 -->
      <section class="strength-section" aria-label="Password strength">
        <div class="strength-bar-container" role="meter" aria-valuemin="1" aria-valuemax="4" aria-valuenow="1" aria-label="Password strength: Weak">
          <div id="strength-bar" class="strength-bar" style="width: 0%;"></div>
        </div>
        <span id="strength-label" class="strength-label"></span>
      </section>
    </main>
  </div>

  <!-- Module entry point — wired in Plan 01-03 -->
  <script type="module" src="src/app.js"></script>
  <script type="module">
    import { initLengthControl } from './src/config/length.js';
    document.addEventListener('DOMContentLoaded', () => {
      initLengthControl();
    });
  </script>
  <script type="module">
    import { initCopyButton } from './src/clipboard.js';
    document.addEventListener('DOMContentLoaded', () => {
      initCopyButton();
    });
  </script>
</body>
</html>
